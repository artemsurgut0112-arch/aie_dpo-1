version: "3.9"

services:
  fraud-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: fraud-detection-api:latest
    container_name: fraud-api
    ports:
      - "8000:8000"
    env_file:
      - configs/.env
    environment:
      LOG_LEVEL: INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
